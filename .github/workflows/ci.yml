name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality / Python 3.14
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install the project
        run: python -m pip install -e ".[dev]"
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Lint
        run: python -m ruff check .
      - name: Check types
        run: python -m mypy src tests
      - name: Run tests with coverage
        run: python -m pytest -q
      - name: Build distributions
        run: python -m build

  compatibility:
    name: Compatibility / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install the project
        run: python -m pip install -e ".[dev]"
      - name: Run the test suite
        run: python -m pytest -q

  wheel:
    name: Wheel / Python ${{ matrix.python-version }} / clean install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.14"
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build the wheel
        run: python -m pip wheel --wheel-dir dist .
      - name: Install the wheel in a clean environment
        run: |
          python -m venv "$RUNNER_TEMP/peftlint-smoke"
          "$RUNNER_TEMP/peftlint-smoke/bin/pip" install \
            --no-index --find-links dist peftlint
      - name: Check installed dependencies
        run: |
          "$RUNNER_TEMP/peftlint-smoke/bin/python" -m pip check
      - name: Check installed metadata, typing marker, and public API
        working-directory: ${{ runner.temp }}
        run: >-
          "$RUNNER_TEMP/peftlint-smoke/bin/python" -I -c
          "import importlib.metadata, importlib.resources, inspect, peftlint;
          from peftlint import adapter_config;
          assert peftlint.__version__ == importlib.metadata.version('peftlint');
          package_root = importlib.resources.files('peftlint');
          assert package_root.joinpath('py.typed').is_file();
          assert package_root.joinpath('adapter_config.py').is_file();
          assert set(adapter_config.__all__) <= set(peftlint.__all__);
          signature = inspect.signature(peftlint.parse_adapter_config);
          assert tuple(signature.parameters) == ('document', 'limits');
          manifest = peftlint.parse_adapter_config(b'{\"peft_type\":\"LORA\"}');
          assert type(manifest) is peftlint.AdapterConfigManifest;
          assert manifest.method_status is peftlint.AdapterMethodStatus.SUPPORTED_LORA;
          assert type(manifest.lora) is peftlint.LoraConfigProfile;
          assert manifest.closed_profile"
